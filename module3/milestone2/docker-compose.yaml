version: "3.8"
services:
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/predict"]
      interval: 30s
      timeout: 10s
      retries: 3